version: "3.9"

x-db-env: &db-env
  POSTGRES_USER:     feedforward
  POSTGRES_PASSWORD: feedforward_secret
  POSTGRES_DB:       feedforward
  POSTGRES_HOST:     db
  POSTGRES_PORT:     "5432"

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     feedforward
      POSTGRES_PASSWORD: feedforward_secret
      POSTGRES_DB:       feedforward
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedforward -d feedforward"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Flask Web App ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *db-env
      SECRET_KEY:  "change-me-in-production"
      FLASK_DEBUG: "false"
      PORT:        "5000"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Unit / Integration Tests (pytest, no Selenium) ────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *db-env
      POSTGRES_DB: feedforward_test
      SECRET_KEY:  "test-secret"
      TESTING:     "true"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c",
      "python -m pytest tests/unit/ tests/integration/ -v --tb=short 2>&1"
    ]
    profiles:
      - test

  # ── Selenium Tests ────────────────────────────────────────────────────────────
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900"   # noVNC browser preview at http://localhost:7900
    shm_size: "2gb"
    profiles:
      - selenium

  selenium-tests:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *db-env
      SECRET_KEY:      "test-secret"
      TESTING:         "true"
      SELENIUM_HOST:   "selenium"
      APP_BASE_URL:    "http://web:5000"
    depends_on:
      db:
        condition: service_healthy
      selenium:
        condition: service_started
    entrypoint: ["sh", "-c",
      "sleep 5 && python -m pytest tests/selenium/ -v --tb=short 2>&1"
    ]
    profiles:
      - selenium

volumes:
  pgdata:
    driver: local
