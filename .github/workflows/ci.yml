name: FeedForward CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Unit + Integration tests
  # ────────────────────────────────────────────────────────────────────────────
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Docker build & Push to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: unit-and-integration
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/feedforward:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Full stack + Selenium tests via Docker Compose
  # ────────────────────────────────────────────────────────────────────────────
  selenium:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start DB and web services
        run: |
          docker compose up -d db web
          echo "Waiting for web service to be healthy..."
          timeout 90 bash -c '
            until docker compose exec -T web python -c \
              "import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")" \
              2>/dev/null; do
              echo "  still waiting..."
              sleep 3
            done
          '
          echo "Web service is up!"

      - name: Set up Python 3.11 for Selenium runner
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome for Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        env:
          APP_BASE_URL: "http://localhost:5000"
          SELENIUM_HOST: "localhost"
        run: |
          pytest tests/selenium/ -v --tb=short

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== web logs ==="
          docker compose logs web
          echo "=== db logs ==="
          docker compose logs db

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy to Server
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [unit-and-integration, selenium]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/feedforward
            # Log in to registry on the server to pull the private image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            git pull origin main
            
            # Recreate .env file
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "POSTGRES_USER=feedforward" >> .env
            echo "POSTGRES_DB=feedforward" >> .env
            echo "POSTGRES_HOST=db" >> .env
            echo "POSTGRES_PORT=5432" >> .env
            
            # Pull the latest image we just pushed in JOB 2
            docker compose pull
            docker compose up -d
            
            # Clean up old unused images to save disk space
            docker system prune -f
