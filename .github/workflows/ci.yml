name: FeedForward CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend tests (models, routes, auth, donations, requests)
  # Uses SQLite in-memory — no Docker required
  # ────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: |
          pytest tests/ \
            --ignore=tests/selenium \
            -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Docker build & Push to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: backend-tests
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/feedforward:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Selenium E2E tests
  # Flask runs natively on the runner against a Postgres service container
  # ────────────────────────────────────────────────────────────────────────────
  selenium:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     feedforward
          POSTGRES_PASSWORD: feedforward_secret
          POSTGRES_DB:       feedforward
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feedforward -d feedforward"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER:     feedforward
      POSTGRES_PASSWORD: feedforward_secret
      POSTGRES_DB:       feedforward
      POSTGRES_HOST:     localhost
      POSTGRES_PORT:     "5432"
      SECRET_KEY:        test-secret-ci
      FLASK_DEBUG:       "false"
      PORT:              "5000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Init DB tables
        run: |
          python - <<'PY'
          from app import create_app
          from models import db
          app = create_app()
          with app.app_context():
              db.create_all()
          print("DB tables created.")
          PY

      - name: Start Flask in background
        run: |
          nohup python app.py > flask.log 2>&1 &
          echo $! > flask.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && echo "Flask is up!" && break
            echo "Waiting... ($i/30)"
            sleep 3
          done

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        env:
          APP_BASE_URL:  "http://localhost:5000"
          SELENIUM_HOST: "localhost"
        run: pytest tests/selenium/ -v --tb=short

      - name: Print Flask logs on failure
        if: failure()
        run: cat flask.log || true

      - name: Stop Flask
        if: always()
        run: |
          [ -f flask.pid ] && kill $(cat flask.pid) || true

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy to Server (main branch only)
  # Skips cleanly if SERVER_HOST secret is not configured yet.
  # Add SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, POSTGRES_PASSWORD, SECRET_KEY
  # under Settings → Secrets and variables → Actions to activate this job.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [backend-tests, selenium]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Skip if deploy secrets not configured
        id: check
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "SERVER_HOST secret not set — deploy skipped."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/feedforward
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            git pull origin main
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "POSTGRES_USER=feedforward" >> .env
            echo "POSTGRES_DB=feedforward" >> .env
            echo "POSTGRES_HOST=db" >> .env
            echo "POSTGRES_PORT=5432" >> .env
            docker compose pull
            docker compose up -d
            docker system prune -f
