name: FeedForward CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Frontend checks (HTML templates + CSS validation)
  # ────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check all HTML templates exist
        run: |
          MISSING=0
          for f in index.html login.html register.html base.html \
                   restaurant_dashboard.html restaurant_history.html \
                   charity_browse.html charity_history.html; do
            if [ -f "templates/$f" ]; then
              echo "✓ templates/$f"
            elif [ -f "$f" ]; then
              echo "✓ $f (root)"
            else
              echo "✗ MISSING: $f"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Check all CSS files exist
        run: |
          MISSING=0
          for f in style.css dashboard.css history.css login.css signup.css charity.css; do
            if [ -f "static/$f" ]; then
              echo "✓ static/$f"
            elif [ -f "$f" ]; then
              echo "✓ $f (root)"
            else
              echo "✗ MISSING: $f"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Check CSS contains required design variables
        run: |
          MISSING=0
          for var in "--theme-dark" "--theme-primary" "--theme-bg" "--theme-surface"; do
            FILES=$(grep -rl "$var" . --include="*.css" 2>/dev/null | head -1)
            if [ -n "$FILES" ]; then
              echo "✓ $var found"
            else
              echo "✗ CSS variable $var not found in any .css file"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Check templates reference valid static files
        run: |
          python3 - <<'EOF'
          import os, sys

          template_dir = "templates" if os.path.isdir("templates") else "."
          css_dir      = "static"    if os.path.isdir("static")    else "."

          expected_css = [
              "style.css", "dashboard.css", "history.css",
              "login.css", "signup.css", "charity.css"
          ]
          issues = []

          for fname in os.listdir(template_dir):
              if not fname.endswith(".html"):
                  continue
              content = open(os.path.join(template_dir, fname)).read()
              for css in expected_css:
                  if css in content:
                      if not os.path.exists(os.path.join(css_dir, css)) and \
                         not os.path.exists(css):
                          issues.append(f"{fname} references {css} but file not found")

          if issues:
              [print("✗", i) for i in issues]
              sys.exit(1)
          print("✓ All template static references are valid")
          EOF

      - name: Check HTML templates have required structural elements
        run: |
          python3 - <<'EOF'
          import os, sys

          template_dir = "templates" if os.path.isdir("templates") else "."
          issues = []

          checks = {
              "base.html":                   ["Inter", "font-awesome"],
              "index.html":                  ["FeedForward", "Restaurant", "Charit"],
              "login.html":                  ["email", "password"],
              "register.html":               ["role", "organization_name"],
              "restaurant_dashboard.html":   ["food_name", "pickup_deadline", "food_category"],
              "restaurant_history.html":     ["Donation History", "filter"],
              "charity_browse.html":         ["search", "Request Donation", "food_name"],
              "charity_history.html":        ["Request History"],
          }

          for fname, keywords in checks.items():
              path = os.path.join(template_dir, fname)
              if not os.path.exists(path):
                  path = fname  # fallback to root
              if not os.path.exists(path):
                  issues.append(f"MISSING template: {fname}")
                  continue
              content = open(path).read()
              for kw in keywords:
                  if kw not in content:
                      issues.append(f"{fname}: expected to contain '{kw}'")

          if issues:
              [print("✗", i) for i in issues]
              sys.exit(1)
          print("✓ All templates contain expected structural elements")
          EOF

      - name: Check no broken Jinja2 block tags
        run: |
          python3 - <<'EOF'
          import os, re, sys

          template_dir = "templates" if os.path.isdir("templates") else "."
          issues = []

          for fname in os.listdir(template_dir):
              if not fname.endswith(".html"):
                  continue
              content = open(os.path.join(template_dir, fname)).read()
              blocks   = re.findall(r"{%\s*block\s+(\w+)", content)
              endblocks = re.findall(r"{%\s*endblock", content)
              if len(blocks) != len(endblocks):
                  issues.append(
                      f"{fname}: {len(blocks)} block(s) but {len(endblocks)} endblock(s)"
                  )

          if issues:
              [print("✗", i) for i in issues]
              sys.exit(1)
          print("✓ All Jinja2 block/endblock tags are balanced")
          EOF

      - name: Check CSS colour palette consistency
        run: |
          python3 - <<'EOF'
          import os, re, sys

          css_dir = "static" if os.path.isdir("static") else "."
          # Hardcoded hex values that should NOT appear — use CSS vars instead
          forbidden_hex = ["#8a7650", "#8e977d", "#ece7d1", "#dbcea5", "#333029"]
          issues = []

          for fname in os.listdir(css_dir):
              if not fname.endswith(".css"):
                  continue
              content = open(os.path.join(css_dir, fname)).read()
              for hex_val in forbidden_hex:
                  if hex_val.lower() in content.lower():
                      issues.append(
                          f"{fname}: hardcoded legacy colour {hex_val} found — use CSS variables"
                      )

          if issues:
              [print("⚠", i) for i in issues]
              # Warning only — don't fail the build for palette drift
          else:
              print("✓ No legacy hardcoded colours found")
          EOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Backend tests (models, routes, auth, donations, requests, broadcasts)
  # Uses SQLite in-memory — no Docker required
  # ────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: |
          pytest tests/ \
            --ignore=tests/selenium \
            -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Docker build & Push to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/feedforward:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Selenium E2E tests
  # Flask runs natively on the runner against a Postgres service container
  # ────────────────────────────────────────────────────────────────────────────
  selenium:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     feedforward
          POSTGRES_PASSWORD: feedforward_secret
          POSTGRES_DB:       feedforward
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feedforward -d feedforward"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER:     feedforward
      POSTGRES_PASSWORD: feedforward_secret
      POSTGRES_DB:       feedforward
      POSTGRES_HOST:     localhost
      POSTGRES_PORT:     "5432"
      SECRET_KEY:        test-secret-ci
      FLASK_DEBUG:       "false"
      PORT:              "5000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Init DB tables
        run: |
          python - <<'PY'
          from app import create_app
          from models import db
          app = create_app()
          with app.app_context():
              db.create_all()
          print("DB tables created.")
          PY

      - name: Start Flask in background
        run: |
          nohup python app.py > flask.log 2>&1 &
          echo $! > flask.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && echo "Flask is up!" && break
            echo "Waiting... ($i/30)"
            sleep 3
          done

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        env:
          APP_BASE_URL:  "http://localhost:5000"
          SELENIUM_HOST: "localhost"
        run: pytest tests/selenium/ -v --tb=short

      - name: Print Flask logs on failure
        if: failure()
        run: cat flask.log || true

      - name: Stop Flask
        if: always()
        run: |
          [ -f flask.pid ] && kill $(cat flask.pid) || true
